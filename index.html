<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GameStore Pro 🎮</title>

<style>

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    margin: 0;
    padding: 20px;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

.container {
    max-width: 800px;
    margin: auto;
}

.card {
    background: rgba(30,41,59,0.8);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

input {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: linear-gradient(90deg, #22c55e, #4ade80);
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    background: linear-gradient(90deg, #16a34a, #22c55e);
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th {
    background: #22c55e;
    color: black;
}

td, th {
    padding: 10px;
    text-align: center;
    border-bottom: 1px solid #334155;
}

tr:hover {
    background: rgba(255,255,255,0.05);
}

</style>
</head>

<body>

<div class="container">

<h2>🎮 GameStore Pro</h2>

<div class="card">
<h3>Agregar Juego</h3>

<form id="form">
<input type="text" id="nombre" placeholder="Nombre del juego" required>
<input type="text" id="plataforma" placeholder="Plataforma (PS5, Xbox, PC)" required>
<input type="number" id="precio" placeholder="Precio" required>
<input type="number" id="stock" placeholder="Stock" required>
<button>Guardar Juego</button>
</form>

</div>

<div class="card">
<h3>📦 Catálogo de Juegos</h3>

<table>
<thead>
<tr>
<th>🎮 Juego</th>
<th>🖥 Plataforma</th>
<th>💲 Precio</th>
<th>📦 Stock</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
