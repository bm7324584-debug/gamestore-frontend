<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GameStore Pro 🎮</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px;
    margin-top: 5px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.btn-guardar {
    background: #22c55e;
    color: black;
    width: 100%;
}

.btn-editar {
    background: #3b82f6;
    color: white;
}

.btn-eliminar {
    background: #ef4444;
    color: white;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border: 1px solid #334155;
    text-align: center;
}

img {
    width: 70px;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

<h2>🎮 GameStore Pro</h2>

<div class="card">
<h3>Agregar Juego</h3>

<form id="form">
<input type="text" id="nombre" placeholder="Nombre del juego" required>
<input type="text" id="plataforma" placeholder="Plataforma" required>
<input type="number" id="precio" placeholder="Precio" required>
<input type="number" id="stock" placeholder="Stock" required>
<input type="text" id="imagen" placeholder="URL imagen (https://...)" required>
<button class="btn-guardar">Guardar</button>
</form>
</div>

<div class="card">
<h3>Catálogo</h3>

<table>
<thead>
<tr>
<th>Imagen</th>
<th>Nombre</th>
<th>Plataforma</th>
<th>Precio</th>
<th>Stock</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
