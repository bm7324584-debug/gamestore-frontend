<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GameStore Pro 🎮</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 20px;
}

.container {
    max-width: 700px;
    margin: auto;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

input, button {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
}

button {
    background: #22c55e;
    color: black;
    border: none;
    font-weight: bold;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border: 1px solid #334155;
}

th {
    background: #22c55e;
    color: black;
}
</style>

</head>

<body>

<div class="container">

<h2>🎮 GameStore Pro</h2>

<div class="card">
<h3>Agregar Juego</h3>

<form id="form">
<input type="text" id="nombre" placeholder="Nombre del juego" required>
<input type="text" id="plataforma" placeholder="Plataforma (PS5, Xbox, PC)" required>
<input type="number" id="precio" placeholder="Precio" required>
<input type="number" id="stock" placeholder="Stock" required>
<button>Guardar Juego</button>
</form>

</div>

<div class="card">
<h3>Lista de Juegos</h3>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>Plataforma</th>
<th>Precio</th>
<th>Stock</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
